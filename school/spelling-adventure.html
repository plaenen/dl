    // ─── HELPERS ────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function scrambleWord(word) {
      let letters = word.split("");
      let scrambled;
      let attempts = 0;
      do {
        scrambled = shuffle(letters).join("");
        attempts++;
      } while (scrambled === word && attempts < 20);
      return scrambled;
    }

    function playSound(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.value = 0.15;
        if (type === "correct") {
          osc.frequency.value = 523; osc.start();
          osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
          osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0, ctx.currentTime + 0.35);
          osc.stop(ctx.currentTime + 0.35);
        } else if (type === "wrong") {
          osc.frequency.value = 200; osc.type = "sawtooth"; osc.start();
          gain.gain.setValueAtTime(0, ctx.currentTime + 0.3);
          osc.stop(ctx.currentTime + 0.3);
        } else if (type === "levelup") {
          osc.frequency.value = 523; osc.start();
          osc.frequency.setValueAtTime(659, ctx.currentTime + 0.15);
          osc.frequency.setValueAtTime(784, ctx.currentTime + 0.3);
          osc.frequency.setValueAtTime(1047, ctx.currentTime + 0.45);
          gain.gain.setValueAtTime(0, ctx.currentTime + 0.7);
          osc.stop(ctx.currentTime + 0.7);
        } else if (type === "click") {
          osc.frequency.value = 800; osc.start();
          gain.gain.setValueAtTime(0, ctx.currentTime + 0.08);
          osc.stop(ctx.currentTime + 0.08);
        }
      } catch (e) {}
    }

    function speakWord(word) {
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = "en-GB";
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      } catch (e) {}
    }

    function Confetti({ active }) {
      const [pieces, setPieces] = useState([]);
      useEffect(() => {
        if (!active) return;
        const items = Array.from({ length: 30 }, (_, i) => ({
          id: Date.now() + i,
          left: Math.random() * 100,
          delay: Math.random() * 0.5,
          emoji: randFrom(["🌟", "⭐", "🎉", "🎊", "✨", "💖", "🦄", "🌈"]),
        }));
        setPieces(items);
        const timer = setTimeout(() => setPieces([]), 3500);
        return () => clearTimeout(timer);
      }, [active]);
      return (<>
        {pieces.map(p => (
          <div key={p.id} className="confetti-piece" style={{ left: `${p.left}%`, animationDelay: `${p.delay}s` }}>{p.emoji}</div>
        ))}
      </>);
    }

    // ─── TRICKY WORDS MODE ──────────────────────────────────────────
    function TrickyWordsMode({ onBack, onStar }) {
      const [words] = useState(() => shuffle(TRICKY_WORDS).slice(0, 10));
      const [idx, setIdx] = useState(0);
      const [phase, setPhase] = useState("show"); // show | type | result
      const [input, setInput] = useState("");
      const [result, setResult] = useState(null);
      const [streak, setStreak] = useState(0);
      const [correctCount, setCorrectCount] = useState(0);
      const [showConfetti, setShowConfetti] = useState(false);
      const [timer, setTimer] = useState(3);
      const inputRef = useRef(null);
      const word = words[idx];
      const done = idx >= words.length;

      // 3-second countdown in "show" phase
      useEffect(() => {
        if (done || phase !== "show") return;
        setTimer(3);
        const interval = setInterval(() => {
          setTimer(t => {
            if (t <= 1) {
              clearInterval(interval);
              setPhase("type");
              return 0;
            }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [idx, phase, done]);

      useEffect(() => {
        if (phase === "type" && inputRef.current) inputRef.current.focus();
      }, [phase]);

      function handleSubmit(e) {
        e.preventDefault();
        if (!input.trim() || phase !== "type") return;
        const correct = input.trim().toLowerCase() === word.word.toLowerCase();
        if (correct) {
          playSound("correct");
          setResult("correct");
          setPhase("result");
          setStreak(s => s + 1);
          setCorrectCount(c => c + 1);
          onStar();
          if ((streak + 1) % 3 === 0) setShowConfetti(true);
        } else {
          playSound("wrong");
          setResult("wrong");
          setPhase("result");
          setStreak(0);
        }
      }

      function nextWord() {
        setIdx(i => i + 1);
        setInput("");
        setResult(null);
        setPhase("show");
        setShowConfetti(false);
      }

      if (done) {
        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #7f1d1d 0%, #b91c1c 50%, #ef4444 100%)", padding: "20px 16px", color: "#fff" }}>
            <div style={{ maxWidth: 500, margin: "0 auto", textAlign: "center", paddingTop: 60 }}>
              <div style={{ fontSize: 64, marginBottom: 16 }} className="bounce-in">⚠️</div>
              <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 8 }}>Tricky Words Complete!</h2>
              <p style={{ fontSize: 20, marginBottom: 24, opacity: 0.9 }}>You got {correctCount} out of {words.length} correct!</p>
              <div style={{ fontSize: 48, marginBottom: 24 }}>{correctCount >= 8 ? "🏆" : correctCount >= 5 ? "⭐" : "💪"}</div>
              <Btn onClick={onBack} color="#ef4444" big>Back to Menu</Btn>
            </div>
            <Confetti active={correctCount >= 8} />
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #7f1d1d 0%, #b91c1c 50%, #ef4444 100%)", padding: "20px 16px", color: "#fff" }}>
          <div style={{ maxWidth: 500, margin: "0 auto" }}>
            <BackBar onBack={onBack} title="Tricky Words ⚠️" />
            <StreakBar streak={streak} total={idx + 1} correct={correctCount} />

            <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: 20, padding: 24, marginBottom: 16, backdropFilter: "blur(10px)" }}>
              <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 8 }}>Word {idx + 1} of {words.length}</div>

              {phase === "show" && (
                <div className="bounce-in" style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 14, opacity: 0.7, marginBottom: 12 }}>Remember this word!</div>
                  <div style={{ fontSize: 36, fontWeight: 800, marginBottom: 16, letterSpacing: 2 }}>{word.word}</div>
                  <div style={{ width: 60, height: 60, borderRadius: "50%", background: "rgba(255,255,255,0.15)",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 800,

                  <div style={{ fontSize: 12, opacity: 0.6, marginTop: 8 }}>Disappearing in {timer}...</div>

              {phase === "type" && (
                <div className="fade-slide">
                  <div style={{ fontSize: 14, marginBottom: 16, textAlign: "center" }}>
                    🧠 Now type the word from memory!

                  <form onSubmit={handleSubmit}>

                      onChange={e => setInput(e.target.value)}
                      placeholder="Type the word..."
                      autoComplete="off"
                      autoCapitalize="off"

                    />
                    <div style={{ marginTop: 12, textAlign: "center" }}>
                      <Btn onClick={() => handleSubmit({ preventDefault: () => {} })} color="#ef4444" disabled={!input.trim()}>Check Spelling</Btn>
                    </div>
                  </form>
                </div>
              )}

              {phase === "result" && (
                <div>
                  {result === "correct" ? (
                    <div className="bounce-in" style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 24, fontWeight: 800, color: "#4ade80" }}>{randFrom(ENCOURAGEMENTS)}</div>
                      <div style={{ fontSize: 16, marginTop: 4 }}>✅ <strong>{word.word}</strong></div>
                    </div>
                  ) : (
                    <div className="shake" style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 18, fontWeight: 700, color: "#fca5a5" }}>{randFrom(WRONG_ENCOURAGEMENTS)}</div>
                      <div style={{ fontSize: 14, marginTop: 4 }}>The word was: <strong>{word.word}</strong></div>

                  <div style={{ marginTop: 16, textAlign: "center" }}>
                    <Btn onClick={nextWord} color="#ef4444">Next Word →</Btn>
                  </div>
                </div>
              )}
            </div>
          </div>
          <Confetti active={showConfetti} />
        </div>

        });
        return shuffle(all).slice(0, 12);

          setStreak(s => s + 1);
          setCorrectCount(c => c + 1);

          if ((streak + 1) % 3 === 0) setShowConfetti(true);

          setResult("wrong");
          setStreak(0);

        setShowConfetti(false);

              <div style={{ fontSize: 20, fontWeight: 600, lineHeight: 1.6, marginBottom: 20, textAlign: "center" }}>
                {parts[0]}
                <span style={{
                  display: "inline-block", minWidth: 80, padding: "2px 12px", borderRadius: 8, margin: "0 4px",
                  background: result ? (selected === q.answer ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)") : "rgba(255,255,255,0.2)",
                  border: `2px dashed ${result ? (selected === q.answer ? "#22c55e" : "#ef4444") : "rgba(255,255,255,0.4)"}`,
                  fontWeight: 800,
                }}>
                  {selected || "___"}
                </span>
                {parts[1]}
              </div>

              {/* Options */}
              <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", marginBottom: 16 }}>
                {q.words.map(w => {
                  let bg = "rgba(255,255,255,0.15)";
                  let border = "2px solid rgba(255,255,255,0.2)";
                  if (result) {
                    if (w === q.answer) { bg = "rgba(34,197,94,0.3)"; border = "2px solid #22c55e"; }
                    else if (w === selected) { bg = "rgba(239,68,68,0.3)"; border = "2px solid #ef4444"; }
                  } else if (w === selected) {
                    bg = "rgba(255,255,255,0.3)"; border = "2px solid rgba(255,255,255,0.5)";
                  }
                  return (
                    <button key={w} onClick={() => handlePick(w)} disabled={!!result} style={{
                      padding: "12px 24px", borderRadius: 12, background: bg, border,
                      color: "#fff", fontSize: 18, fontWeight: 700, cursor: result ? "default" : "pointer",
                      transition: "all 0.2s", minWidth: 90,
                    }}>{w}</button>
                  );
                })}
              </div>

              {/* Result & explanation */}
              {result && (
                <div className={result === "correct" ? "bounce-in" : "shake"}>
                  {result === "correct" ? (
                    <div style={{ textAlign: "center", color: "#4ade80", fontWeight: 800, fontSize: 20, marginBottom: 8 }}>
                      {randFrom(ENCOURAGEMENTS)}
                    </div>
                  ) : (
                    <div style={{ textAlign: "center", color: "#fca5a5", fontWeight: 700, fontSize: 16, marginBottom: 8 }}>
                      {randFrom(WRONG_ENCOURAGEMENTS)} The answer is <strong>{q.answer}</strong>.
                    </div>
                  )}

                  <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 12, padding: 14, marginBottom: 12 }}>
                    <div style={{ fontSize: 13, lineHeight: 1.6 }}>📖 {q.explain}</div>
                  </div>

                  {/* Meanings reference */}
                  <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: 14 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 6, opacity: 0.7 }}>Quick Reference:</div>
                    {q.words.map(w => (
                      <div key={w} style={{ fontSize: 12, lineHeight: 1.6 }}>
                        <strong>{w}</strong> = {q.meanings[w]}
                      </div>
                    ))}
                  </div>

                  <div style={{ marginTop: 16, textAlign: "center" }}>
                    <Btn onClick={nextQuestion} color="#3b82f6">Next Question →</Btn>
                  </div>
                </div>
              )}
            </div>
          </div>
          <Confetti active={showConfetti} />
        </div>
      );
    }

    // ─── WORD BUILDER MODE ──────────────────────────────────────────
    function WordBuilderMode({ onBack, onStar }) {
      const [words] = useState(() => shuffle(WORD_BUILDER_DATA).slice(0, 10));
      const [idx, setIdx] = useState(0);
      const [input, setInput] = useState("");
      const [result, setResult] = useState(null);
      const [streak, setStreak] = useState(0);
      const [correctCount, setCorrectCount] = useState(0);
      const [showConfetti, setShowConfetti] = useState(false);
      const inputRef = useRef(null);
      const word = words[idx];
      const done = idx >= words.length;

      useEffect(() => {
        if (!done && !result && inputRef.current) inputRef.current.focus();
      }, [idx, result, done]);

      function handleSubmit(e) {
        e.preventDefault();
        if (!input.trim() || result) return;
        const correct = input.trim().toLowerCase() === word.result.toLowerCase();
        if (correct) {
          playSound("correct");
          setResult("correct");
          setStreak(s => s + 1);
          setCorrectCount(c => c + 1);
          onStar();
          if ((streak + 1) % 3 === 0) setShowConfetti(true);
        } else {
          playSound("wrong");
          setResult("wrong");
          setStreak(0);
        }
      }

      function nextWord() {
        setIdx(i => i + 1);
        setInput("");
        setResult(null);
        setShowConfetti(false);
      }

      if (done) {
        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #3b0764 0%, #6b21a8 50%, #8b5cf6 100%)", padding: "20px 16px", color: "#fff" }}>
            <div style={{ maxWidth: 500, margin: "0 auto", textAlign: "center", paddingTop: 60 }}>
              <div style={{ fontSize: 64, marginBottom: 16 }} className="bounce-in">🔨</div>
              <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 8 }}>Word Builder Complete!</h2>
              <p style={{ fontSize: 20, marginBottom: 24, opacity: 0.9 }}>You got {correctCount} out of {words.length} correct!</p>
              <div style={{ fontSize: 48, marginBottom: 24 }}>{correctCount >= 8 ? "🏆" : correctCount >= 5 ? "⭐" : "💪"}</div>
              <Btn onClick={onBack} color="#8b5cf6" big>Back to Menu</Btn>
            </div>
            <Confetti active={correctCount >= 8} />
          </div>
        );
      }

      const ruleTypeLabel = {
        "simple": "📗 Simple - just join them!",
        "drop-e": "📕 Rule: Drop the silent e!",
        "y-to-i": "📙 Rule: Change y to i!",
        "double": "📘 Rule: Double the last consonant!",
        "drop-le": "📒 Rule: Drop -le, add -ly!",
      };

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #3b0764 0%, #6b21a8 50%, #8b5cf6 100%)", padding: "20px 16px", color: "#fff" }}>
          <div style={{ maxWidth: 500, margin: "0 auto" }}>
            <BackBar onBack={onBack} title="Word Builder 🔨" />
            <StreakBar streak={streak} total={idx + 1} correct={correctCount} />

            <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: 20, padding: 24, marginBottom: 16, backdropFilter: "blur(10px)" }}>
              <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 12 }}>Word {idx + 1} of {words.length}</div>

              {/* Visual: root + affix */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
                {word.type === "prefix" ? (
                  <>
                    <div style={{ padding: "10px 18px", borderRadius: 12, background: "rgba(251,191,36,0.3)", border: "2px solid #fbbf24", fontSize: 22, fontWeight: 800 }}>
                      {word.affix}
                    </div>
                    <div style={{ fontSize: 28, fontWeight: 300 }}>+</div>
                    <div style={{ padding: "10px 18px", borderRadius: 12, background: "rgba(255,255,255,0.2)", border: "2px solid rgba(255,255,255,0.3)", fontSize: 22, fontWeight: 800 }}>
                      {word.root}
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{ padding: "10px 18px", borderRadius: 12, background: "rgba(255,255,255,0.2)", border: "2px solid rgba(255,255,255,0.3)", fontSize: 22, fontWeight: 800 }}>
                      {word.root}
                    </div>
                    <div style={{ fontSize: 28, fontWeight: 300 }}>+</div>
                    <div style={{ padding: "10px 18px", borderRadius: 12, background: "rgba(251,191,36,0.3)", border: "2px solid #fbbf24", fontSize: 22, fontWeight: 800 }}>
                      {word.affix}
                    </div>
                  </>
                )}
                <div style={{ fontSize: 28, fontWeight: 300 }}>=</div>
                <div style={{ fontSize: 28, fontWeight: 800 }}>?</div>
              </div>

              {/* Rule type hint */}
              <div style={{ fontSize: 13, opacity: 0.8, textAlign: "center", marginBottom: 16 }}>
                {ruleTypeLabel[word.ruleType] || ""}
              </div>

              {/* Input */}
              <form onSubmit={handleSubmit}>
                <input
                  ref={inputRef}
                  type="text"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  placeholder="Type the new word..."
                  disabled={!!result}
                  autoComplete="off"
                  autoCapitalize="off"
                  spellCheck="false"
                />
                {!result && (
                  <div style={{ marginTop: 12, textAlign: "center" }}>
                    <Btn onClick={() => handleSubmit({ preventDefault: () => {} })} color="#8b5cf6" disabled={!input.trim()}>Check Word</Btn>
                  </div>
                )}
              </form>

              {result === "correct" && (
                <div className="bounce-in" style={{ marginTop: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: "#4ade80" }}>{randFrom(ENCOURAGEMENTS)}</div>
                  <div style={{ fontSize: 16, marginTop: 4 }}>✅ <strong>{word.result}</strong></div>
                </div>
              )}
              {result === "wrong" && (
                <div className="shake" style={{ marginTop: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#fca5a5" }}>{randFrom(WRONG_ENCOURAGEMENTS)}</div>
                  <div style={{ fontSize: 14, marginTop: 4 }}>The answer is: <strong>{word.result}</strong></div>
                  <LetterComparison guess={input.trim()} correct={word.result} />
                </div>
              )}

              {result && (
                <div style={{ marginTop: 12 }}>
                  <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 12, padding: 14 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>📝 Spelling Rule:</div>
                    <div style={{ fontSize: 13, lineHeight: 1.5 }}>{word.rule}</div>
                  </div>
                  <div style={{ marginTop: 12, textAlign: "center" }}>
                    <Btn onClick={nextWord} color="#8b5cf6">Next Word →</Btn>
                  </div>
                </div>
              )}
            </div>
          </div>
          <Confetti active={showConfetti} />
        </div>
      );
    }

    // ─── APP ────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("home");
      const [stars, setStars] = useState(loadStars);

      function addStar() {
        setStars(s => {
          const next = s + 1;
          saveStars(next);
          return next;
        });
      }

      switch (screen) {
        case "bee":
          return <SpellingBeeMode onBack={() => setScreen("home")} onStar={addStar} />;
        case "unscramble":
          return <UnscrambleMode onBack={() => setScreen("home")} onStar={addStar} />;
        case "tricky":
          return <TrickyWordsMode onBack={() => setScreen("home")} onStar={addStar} />;
        case "homophones":
          return <HomophonesMode onBack={() => setScreen("home")} onStar={addStar} />;
        case "builder":
          return <WordBuilderMode onBack={() => setScreen("home")} onStar={addStar} />;
        default:
          return <HomeScreen onNavigate={setScreen} stars={stars} />;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
